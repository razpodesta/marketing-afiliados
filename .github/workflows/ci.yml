name: CI Pipeline

on:
  pull_request:
    branches: [main, master, develop]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Run linter
        run: pnpm lint

      - name: Run type checking
        run: pnpm typecheck

      - name: Run full test suite (CI)
        run: pnpm test:ci
        env:
          # ===================================================================
          # CONTRATO DE SECRETOS DE GITHUB:
          # Estas variables DEBEN estar configuradas en los "Repository Secrets"
          # de GitHub. El linter del IDE advierte sobre ellas porque no puede
          # verificarlas localmente, pero su configuración en GitHub es la
          # única fuente de verdad.
          # ===================================================================
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
